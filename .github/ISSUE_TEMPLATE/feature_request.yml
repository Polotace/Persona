name: Feature request
description: Propose a user-facing capability or a focused architectural improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user need or limitation, not only a preferred implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe the expected behavior and user value.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Privacy and architecture impact
      description: Explain effects on local-first behavior, user control, data ownership, or established module boundaries.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: agreement
    attributes:
      label: Project principles
      options:
        - label: This proposal does not require autonomous message sending or unapproved user impersonation.
          required: true
        - label: I have not included personal conversation data or credentials.
          required: true
